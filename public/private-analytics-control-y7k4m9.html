<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet" />
  <title>Internal Analytics Control | Yoryantra</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f8fafc;
      color: #111827;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.06);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: #6b7280;
      font-size: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.25;
    }

    .status {
      margin-top: 24px;
      border-left: 4px solid #c89b3c;
      background: #fffbeb;
      padding: 16px;
      border-radius: 8px;
    }

    .status.disabled {
      border-left-color: #15803d;
      background: #f0fdf4;
    }

    .status.error {
      border-left-color: #b91c1c;
      background: #fef2f2;
    }

    .status strong {
      display: block;
      margin-bottom: 4px;
    }

    .status p {
      margin: 0;
      color: #4b5563;
      font-size: 14px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    button {
      border: 0;
      border-radius: 9px;
      padding: 12px 16px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .disable {
      background: #111827;
      color: #ffffff;
    }

    .enable {
      border: 1px solid #d1d5db;
      background: #ffffff;
      color: #111827;
    }

    .note {
      margin: 20px 0 0;
      color: #6b7280;
      font-size: 12px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Yoryantra</p>
    <h1>Internal analytics control</h1>

    <section id="status" class="status" aria-live="polite">
      <strong>Checking this browser…</strong>
      <p>Please wait.</p>
    </section>

    <div class="actions">
      <button class="disable" id="disableButton" type="button">
        Disable analytics
      </button>

      <button class="enable" id="enableButton" type="button">
        Re-enable analytics
      </button>
    </div>

    <p class="note">
      This setting applies to yoryantra.com and its www hostname in this browser.
      Clearing website cookies removes the setting. This standalone page does not
      load Google Analytics or Google Tag Manager.
    </p>
  </main>

  <script>
    (function () {
      "use strict";

      var COOKIE_NAME = "internal_staff";
      var COOKIE_DOMAIN = "yoryantra.com";
      var ONE_YEAR_IN_SECONDS = 31536000;
      var statusBox = document.getElementById("status");
      var disableButton = document.getElementById("disableButton");
      var enableButton = document.getElementById("enableButton");

      function hasInternalCookie() {
        return document.cookie
          .split(";")
          .map(function (cookie) {
            return cookie.trim();
          })
          .some(function (cookie) {
            return cookie === COOKIE_NAME + "=true";
          });
      }

      function renderStatus(type) {
        statusBox.className = "status";

        if (type === "disabled") {
          statusBox.classList.add("disabled");
          statusBox.innerHTML =
            "<strong>Internal analytics is disabled.</strong>" +
            "<p>This browser is marked as internal for Yoryantra.</p>";
          return;
        }

        if (type === "enabled") {
          statusBox.innerHTML =
            "<strong>Analytics is enabled.</strong>" +
            "<p>This browser is currently treated as a regular visitor.</p>";
          return;
        }

        statusBox.classList.add("error");
        statusBox.innerHTML =
          "<strong>The cookie could not be updated.</strong>" +
          "<p>Make sure cookies are allowed and open this page on the live HTTPS website.</p>";
      }

      function disableAnalytics() {
        document.cookie = [
          COOKIE_NAME + "=true",
          "Max-Age=" + ONE_YEAR_IN_SECONDS,
          "Path=/",
          "Domain=" + COOKIE_DOMAIN,
          "SameSite=Lax",
          "Secure"
        ].join("; ");

        renderStatus(hasInternalCookie() ? "disabled" : "error");
      }

      function enableAnalytics() {
        // Remove the domain-scoped cookie.
        document.cookie = [
          COOKIE_NAME + "=",
          "Max-Age=0",
          "Path=/",
          "Domain=" + COOKIE_DOMAIN,
          "SameSite=Lax",
          "Secure"
        ].join("; ");

        // Also remove any older host-only version created by the previous file.
        document.cookie = [
          COOKIE_NAME + "=",
          "Max-Age=0",
          "Path=/",
          "SameSite=Lax",
          "Secure"
        ].join("; ");

        renderStatus(!hasInternalCookie() ? "enabled" : "error");
      }

      disableButton.addEventListener("click", disableAnalytics);
      enableButton.addEventListener("click", enableAnalytics);

      var action = new URLSearchParams(window.location.search).get("action");

      if (action === "disable") {
        disableAnalytics();
      } else if (action === "enable") {
        enableAnalytics();
      } else {
        renderStatus(hasInternalCookie() ? "disabled" : "enabled");
      }
    })();
  </script>
</body>
</html>
